name: Release

# Builds and attaches the update package whenever a vX.Y.Z tag is pushed.
# The in-app updater (v0.1.4+) downloads truani-<version>.tar.gz and verifies it
# against checksums.txt, so every release from v0.1.5 on must carry both assets.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release package
        env:
          TAG: ${{ github.ref_name }}
        run: bash scripts/build-release.sh

      - name: Attach assets to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="$(cat VERSION)"
          ASSETS=( "dist/truani-${VERSION}.tar.gz" "dist/checksums.txt" )
          # If the release already exists (created with hand-written notes),
          # just attach/overwrite the assets; otherwise create it.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            gh release create "$TAG" "${ASSETS[@]}" --title "$TAG" --generate-notes
          fi
