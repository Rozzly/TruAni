{% extends "base.html" %}
{% block title %}TruAni — Login{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">
            <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                <path d="M10,52 Q6,38 10,28 L7,8 L22,22 Q27,18 32,18 Q37,18 42,22 L57,8 L54,28 Q58,38 54,52 Q44,58 32,58 Q20,58 10,52 Z"/>
                <line x1="11" y1="22" x2="20" y2="24" stroke-width="1.5"/>
                <line x1="53" y1="22" x2="44" y2="24" stroke-width="1.5"/>
                <path d="M15,34 L27,34" stroke-width="3"/>
                <path d="M15,34 Q15,42 21,42 Q27,42 27,34" stroke-width="2"/>
                <path d="M37,34 L49,34" stroke-width="3"/>
                <path d="M37,34 Q37,42 43,42 Q49,42 49,34" stroke-width="2"/>
                <ellipse cx="21" cy="38" rx="3" ry="2.5" fill="currentColor" stroke="none"/>
                <ellipse cx="43" cy="38" rx="3" ry="2.5" fill="currentColor" stroke="none"/>
                <circle cx="19.5" cy="37" r="1.2" fill="var(--color-bg-raised)" stroke="none"/>
                <circle cx="41.5" cy="37" r="1.2" fill="var(--color-bg-raised)" stroke="none"/>
                <circle cx="32" cy="45" r="0.8" fill="currentColor" stroke="none"/>
                <path d="M27,49 L32,46 L37,49" stroke-width="1.8"/>
                <line x1="3" y1="38" x2="15" y2="40" stroke-width="1.5"/>
                <line x1="4" y1="44" x2="15" y2="43" stroke-width="1.5"/>
                <line x1="61" y1="38" x2="49" y2="40" stroke-width="1.5"/>
                <line x1="60" y1="44" x2="49" y2="43" stroke-width="1.5"/>
            </svg>
        </div>
        <h1 class="login-title">TruAni</h1>
        <p class="login-subtitle">Seasonal Anime Manager</p>
        <form method="POST" action="/login">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
